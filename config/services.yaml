parameters:
    app.storage_driver: '%env(STORAGE_DRIVER)%'
    app.max_upload_size: '%env(MAX_UPLOAD_SIZE)%'
    app.default_expiry_days: '%env(int:DEFAULT_EXPIRY_DAYS)%'
    app.default_max_downloads: '%env(int:DEFAULT_MAX_DOWNLOADS)%'
    app.library_path: '%env(default::LIBRARY_PATH)%'
    app.library_external_path: '%env(default::LIBRARY_EXTERNAL_PATH)%'
    app.library_scan_depth: '%env(int:default::LIBRARY_SCAN_DEPTH)%'
    app.theme_default: 'longhorn'
    app.storage_path: '/app/storage'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Theme/'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Theme\:
        resource: '../src/Theme/'

    App\Theme\ThemeRegistry:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $defaultId: '%app.theme_default%'

    App\Theme\ThemeStore:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Storage\LocalStorage:
        arguments:
            $storagePath: '/app/storage'

    App\Storage\LibraryStorage:
        arguments:
            $libraryPath: '%app.library_path%'
            $externalPath: '%app.library_external_path%'

    App\Service\TransferService:
        arguments:
            $defaultExpiryDays: '%app.default_expiry_days%'
            $defaultMaxDownloads: '%app.default_max_downloads%'

    App\Service\LibraryService:
        arguments:
            $defaultExpiryDays: '%app.default_expiry_days%'
            $defaultMaxDownloads: '%app.default_max_downloads%'
            $scanDepth: '%app.library_scan_depth%'
            $maxUploadSize: '%app.max_upload_size%'

    App\Service\UploadSessionService:
        arguments:
            $projectDir: '%kernel.project_dir%'
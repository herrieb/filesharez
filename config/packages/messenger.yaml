framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(REDIS_URL)%'
                options:
                  stream: messages
                  group: filesharez
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 60000

            failed:
                dsn: '%env(REDIS_URL)%'
                options:
                  stream: failed

            scheduler_default:
                dsn: '%env(REDIS_URL)%/schedule'

        routing:
            App\Message\SendTransferEmail: async
            App\Message\SendFileRequestUploadEmail: async
            App\Message\SendDownloadNotificationEmail: async
            App\Message\CleanupExpiredTransfers: async
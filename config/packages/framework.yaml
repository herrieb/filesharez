framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: true
    handle_all_throwables: true

    csrf_protection:
        enabled: true
        stateless_token_ids: []

    form:
        csrf_protection: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    router:
        utf8: true

    php_errors:
        log: true

    error_controller: App\Controller\ErrorController::show